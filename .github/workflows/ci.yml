name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies (no Spark)
        run: |
          python -m pip install --upgrade pip
          pip install 'pandera[pandas]>=0.20' pytest pytest-cov pandas pyyaml numpy h3 requests ruff

      - name: Lint with ruff (advisory)
        run: ruff check src tests || true

      - name: Run contract tests
        run: PYTHONPATH=src pytest -v --cov=catmob --cov-report=term-missing

      - name: Verify schema registry
        run: |
          PYTHONPATH=src python -c "from catmob.schemas import SCHEMA_REGISTRY; print(f'OK — {len(SCHEMA_REGISTRY)} schemas registered')"
