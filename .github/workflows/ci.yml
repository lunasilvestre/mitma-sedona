name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (test extras only — no Spark in CI)
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install 'pandera[pandas]>=0.20' pytest pytest-cov pandas ruff

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check src tests || true   # advisory until we tighten

      - name: Run contract tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=src pytest -v --cov=catmob --cov-report=term-missing

      - name: Verify schema registry
        run: |
          source .venv/bin/activate
          PYTHONPATH=src python -c "from catmob.schemas import SCHEMA_REGISTRY; print(f'OK — {len(SCHEMA_REGISTRY)} schemas registered')"
